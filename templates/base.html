<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Placement Intelligence{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --accent-hover: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Desktop-style Mesh Gradient Background */
        .glow-1, .glow-2 {
            position: fixed;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.4;
        }
        .glow-1 {
            width: 600px;
            height: 600px;
            background: #4A00E0;
            top: -200px;
            left: -100px;
        }
        .glow-2 {
            width: 500px;
            height: 500px;
            background: #8E2DE2;
            bottom: -100px;
            right: -100px;
        }

        /* Top Navigation */
        nav {
            width: 100%;
            max-width: 1200px;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: var(--text-primary);
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 900px;
            padding: 40px;
            margin-top: 4vh;
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        h1, h2 {
            font-weight: 500;
            letter-spacing: -0.04em;
            margin-bottom: 16px;
        }

        h1 { font-size: 3rem; }
        h2 { font-size: 2rem; }

        p {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 1.05rem;
            font-weight: 300;
        }

        /* Forms and Inputs */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        input[type="number"] {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="number"]:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Buttons */
        .btn {
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn.secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .btn.secondary:hover {
            background: var(--accent-hover);
        }

        .action-group {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .input-grid {
                grid-template-columns: 1fr;
            }
            .container {
                width: 90%;
                padding: 32px 24px;
                border-radius: 20px;
            }
            h1 { font-size: 2.2rem; }
            .action-group {
                flex-direction: column;
            }
            .nav-links {
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <nav>
        <a href="/" class="logo">Placement AI</a>
        <div class="nav-links">
            <a href="/predict">Predict</a>
            <a href="/about">About</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
