{% extends 'base.html' %}

{% block content %}
    <h2>Data Input</h2>
    <p style="margin-bottom: 24px;">Enter the candidate's academic and performance metrics below.</p>

    <div id="error-box" style="display: none; background: rgba(255, 50, 50, 0.1); border: 1px solid rgba(255, 50, 50, 0.3); color: #ff8888; padding: 12px 16px; border-radius: 12px; margin-bottom: 24px; font-size: 0.9rem;">
        ⚠️ <span id="error-text">Please check your inputs.</span>
    </div>

    <form id="prediction-form" action="/result" method="post">
        <div class="input-grid">
            <div class="input-group">
                <label>CGPA (0.0 to 10.0)</label>
                <input type="number" step="0.1" min="0.0" max="10.0" name="cgpa" id="cgpa" placeholder="e.g. 8.5" required>
            </div>

            <div class="input-group">
                <label>Internships (0+)</label>
                <input type="number" min="0" max="20" step="1" name="internships" id="internships" placeholder="Total count" required>
            </div>

            <div class="input-group">
                <label>Projects (0+)</label>
                <input type="number" min="0" max="50" step="1" name="projects" id="projects" placeholder="Total count" required>
            </div>

            <div class="input-group">
                <label>Aptitude Score (0 to 100)</label>
                <input type="number" min="0" max="100" step="1" name="aptitude" id="aptitude" placeholder="Scale of 100" required>
            </div>

            <div class="input-group">
                <label>Soft Skills (1 to 10)</label>
                <input type="number" min="1" max="10" step="1" name="softskills" id="softskills" placeholder="Scale of 10" required>
            </div>
        </div>

        <button type="submit" class="btn" id="submit-btn">
            <span id="btn-text">Process Data</span>
            <svg id="btn-spinner" style="display: none; width: 20px; height: 20px; animation: spin 1s linear infinite;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </button>
    </form>

    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>

    <script>
        document.getElementById('prediction-form').addEventListener('submit', function(e) {
            const errorBox = document.getElementById('error-box');
            const errorText = document.getElementById('error-text');
            
            const cgpa = parseFloat(document.getElementById('cgpa').value);
            const aptitude = parseInt(document.getElementById('aptitude').value);
            const softskills = parseInt(document.getElementById('softskills').value);

            if (cgpa < 0 || cgpa > 10) {
                e.preventDefault();
                errorText.innerText = "CGPA must be between 0.0 and 10.0.";
                errorBox.style.display = 'block';
                return;
            }
            if (aptitude < 0 || aptitude > 100) {
                e.preventDefault();
                errorText.innerText = "Aptitude score must be between 0 and 100.";
                errorBox.style.display = 'block';
                return;
            }
            if (softskills < 1 || softskills > 10) {
                e.preventDefault();
                errorText.innerText = "Soft skills rating must be between 1 and 10.";
                errorBox.style.display = 'block';
                return;
            }

            errorBox.style.display = 'none';
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const submitBtn = document.getElementById('submit-btn');

            btnText.innerText = "Analyzing...";
            btnSpinner.style.display = "block";
            submitBtn.style.opacity = "0.7";
            submitBtn.style.cursor = "not-allowed";
        });
    </script>
{% endblock %}
