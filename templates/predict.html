{% extends 'base.html' %}

{% block content %}
    <h2>Data Input</h2>
    <p style="margin-bottom: 32px;">Enter the candidate's academic and performance metrics below.</p>

    <form action="/result" method="post">
        <div class="input-grid">
            <div class="input-group">
                <label>CGPA</label>
                <input type="number" step="0.1" name="cgpa" placeholder="Scale of 10.0" required>
            </div>

            <div class="input-group">
                <label>Internships</label>
                <input type="number" name="internships" placeholder="Total count" required>
            </div>

            <div class="input-group">
                <label>Projects</label>
                <input type="number" name="projects" placeholder="Total count" required>
            </div>

            <div class="input-group">
                <label>Aptitude Score</label>
                <input type="number" name="aptitude" placeholder="Scale of 100" required>
            </div>

            <div class="input-group">
                <label>Soft Skills</label>
                <input type="number" name="softskills" placeholder="Scale of 10" required>
            </div>
        </div>

        <button type="submit" class="btn">Process Data</button>
    </form>
{% endblock %}
