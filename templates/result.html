{% extends 'base.html' %}

{% block content %}
    <style>
        .result-metric {
            font-size: 4rem;
            font-weight: 300;
            color: var(--text-primary);
            margin: 24px 0 8px 0;
            letter-spacing: -0.05em;
        }
        .advice-box {
            margin-top: 32px;
            padding: 24px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 0 12px 12px 0;
        }
    </style>

    <p style="text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem;">Analysis Complete</p>
    
    <div class="result-metric">{{ probability }}%</div>
    <h2>{{ prediction }}</h2>

    <div class="advice-box">
        <label>System Recommendation</label>
        <p style="margin-top: 8px; color: var(--text-primary);">{{ advice }}</p>
    </div>

    <div class="action-group" style="margin-top: 40px;">
        <a href="/predict" class="btn secondary">Analyze New Profile</a>
    </div>
{% endblock %}
